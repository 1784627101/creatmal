<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人机验证 - 机械动力蓝图社区</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .verify-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 48px 40px 40px;
            max-width: 420px;
            width: 92%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .verify-card .logo {
            font-size: 24px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 4px;
        }
        .verify-card .logo span {
            color: #e0e0e0;
        }
        .verify-card .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .turnstile-wrapper {
            display: flex;
            justify-content: center;
            min-height: 70px;
            margin-bottom: 12px;
        }
        #status {
            font-size: 14px;
            min-height: 24px;
            margin-top: 4px;
        }
        #status.loading {
            color: #fbbf24;
        }
        #status.success {
            color: #22c55e;
        }
        #status.error {
            color: #ef4444;
        }
        #goBtn {
            display: none;
            margin-top: 16px;
            padding: 12px 36px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        #goBtn:hover {
            background: #2563eb;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #4b5563;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="logo">Create<span>Mechanical</span></div>
        <p class="subtitle">人机验证 · 请完成下方验证</p>
        <div class="turnstile-wrapper">
            <div class="cf-turnstile"
                 id="turnstileContainer"
                 data-sitekey="0x4AAAAAADj8FUL5FsPg34ng"
                 data-callback="onVerifySuccess"
                 data-error-callback="onVerifyError"
                 data-expired-callback="onVerifyExpired">
            </div>
        </div>
        <div id="status">加载验证中...</div>
        <button id="goBtn" onclick="goToTarget()">验证通过，进入网站</button>
        <div class="footer">
            由 Cloudflare Turnstile 保护 · <a href="#" onclick="location.reload()">刷新重试</a>
        </div>
    </div>

    <script>
        var TARGET_URL = 'https://1784627101.github.io/creatmodel/';
        var API_URL = 'https://energetic-presence-production.up.railway.app/api';
        var statusEl = document.getElementById('status');
        var goBtn = document.getElementById('goBtn');

        window.onVerifySuccess = function (token) {
            statusEl.textContent = '正在验证身份...';
            statusEl.className = 'loading';
            var fakeUsername = 'turnstile_verify_' + Date.now();
            var fakePassword = 'TempPass123!';
            fetch(API_URL + '/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: fakeUsername,
                    password: fakePassword,
                    email: 'verify@temp.com',
                    agreedTosVersion: 'v1.0',
                    token: token
                })
            })
            .then(function(res) { return res.json(); })
            .then(function(result) {
                if (result.success) {
                    statusEl.textContent = '验证通过';
                    statusEl.className = 'success';
                    goBtn.style.display = 'inline-block';
                } else if (result.error && result.error.indexOf('人机验证') !== -1) {
                    statusEl.textContent = '验证失败: ' + result.error;
                    statusEl.className = 'error';
                    goBtn.style.display = 'none';
                } else {
                    statusEl.textContent = '验证通过';
                    statusEl.className = 'success';
                    goBtn.style.display = 'inline-block';
                }
            })
            .catch(function() {
                statusEl.textContent = '网络错误，请刷新重试';
                statusEl.className = 'error';
                goBtn.style.display = 'none';
            });
        };

        window.onVerifyError = function () {
            statusEl.textContent = '验证失败，请刷新重试';
            statusEl.className = 'error';
            goBtn.style.display = 'none';
        };

        window.onVerifyExpired = function () {
            statusEl.textContent = '验证已过期，请重新验证';
            statusEl.className = 'error';
            goBtn.style.display = 'none';
        };

        function goToTarget() {
            window.location.href = TARGET_URL;
        }

        document.addEventListener('DOMContentLoaded', function () {
            statusEl.textContent = '加载验证中...';
            statusEl.className = 'loading';
        });
    </script>
</body>
</html>
